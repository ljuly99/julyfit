function calcM(pr,w0,dt="training"){
  const w=parseFloat(w0||pr.weight||0),age=parseInt(pr.age||25),h=parseFloat(pr.height||170);
  if(!w||!h) return null;
  const protGkg={cut:{training:2.5,rest:2.6},maintain:{training:1.9,rest:2.0},bulk:{training:1.8,rest:1.9}};
  const fatGkg={cut:0.8,maintain:1.0,bulk:1.0};
  const carbGkg={cut:{training:2.0,rest:1.5},maintain:{training:3.5,rest:2.2},bulk:{training:4.5,rest:3.0}};
  const g=pr.goal||"cut";
  const prot=Math.round(w*((protGkg[g]||protGkg.cut)[dt]||2.5));
  const fat=Math.round(w*(fatGkg[g]||0.8));
  const carb=Math.round(w*((carbGkg[g]||carbGkg.cut)[dt]||2.2));
  const kcal=Math.round(prot*4+carb*4+fat*9);
  return{kcal,prot,carb,fat,goal:g,dt};
}
function calcBF(sex,h,w,hi,n){
  const cm2in=x=>parseFloat(x)/2.54;
  const H=cm2in(h),W=cm2in(w),HI=cm2in(hi||0),N=cm2in(n||0);
  if(!H||!W||H<30||W<5) return null;
  if(sex==="female"){
    if(!HI||!N||HI<10||N<3)return null;
    return Math.max(5,Math.min(60,Math.round((163.205*Math.log10(W+HI-N)-97.684*Math.log10(H)-78.387)*10)/10));
  }
  if(!N||N<3)return null;
  return Math.max(3,Math.min(55,Math.round((86.010*Math.log10(W-N)-70.041*Math.log10(H)+36.76)*10)/10));
}

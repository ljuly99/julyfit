function calcM(pr,w0,dt="normal"){
  const w=parseFloat(w0||pr.weight||0),age=parseInt(pr.age||25),h=parseFloat(pr.height||170);
  if(!w||!h) return null;
  const g=GA[pr.goal]||GA.cut;
  const dm=DT[dt]||DT.normal;

  // PROTEINA basada en peso segun objetivo y tipo de dia
  // En deficit se sube para preservar musculo (ISSN: 1.8-2.4g/kg)
  const protGkg={
    cut:     {training:2.2, rest:2.4},
    maintain:{training:1.8, rest:2.0},
    bulk:    {training:1.8, rest:2.0},
  };
  const prot=Math.round(w*((protGkg[pr.goal]||protGkg.cut)[dt]||(protGkg[pr.goal]||protGkg.cut).rest));

  // GRASA basada en peso (0.8-1.0g/kg segun objetivo)
  const fatGkg={cut:0.8, maintain:1.0, bulk:1.0};
  const fat=Math.round(w*(fatGkg[pr.goal]||0.8));

  // CARBOS basados en peso, objetivo y tipo de dia
  // Periodizacion de carbos: mas en entreno, menos en descanso
  // Rangos validados por ISSN/ACSM para cada objetivo
  const carbGkg={
    cut:     {training:2.2, rest:1.4},
    maintain:{training:3.5, rest:2.2},
    bulk:    {training:4.5, rest:3.0},
  };
  const carb=Math.round(w*((carbGkg[pr.goal]||carbGkg.cut)[dt]||(carbGkg[pr.goal]||carbGkg.cut).rest));

  const kcal=Math.round(prot*4+carb*4+fat*9);
  return{kcal,prot,carb,fat,g,dm};
}

function calcBF(sex,h,w,hi,n){
  // Fórmula Marina EE.UU. - convierte cm a pulgadas
  const cm2in=x=>parseFloat(x)/2.54;
  const H=cm2in(h),W=cm2in(w),HI=cm2in(hi||0),N=cm2in(n||0);
  if(!H||!W||H<30||W<5) return null;
  if(sex==="female"){
    if(!HI||!N||HI<10||N<3)return null;
    const bf=163.205*Math.log10(W+HI-N)-97.684*Math.log10(H)-78.387;
    return Math.max(5,Math.min(60,Math.round(bf*10)/10));
  }
  if(!N||N<3)return null;
  const bf=86.010*Math.log10(W-N)-70.041*Math.log10(H)+36.76;
  return Math.max(3,Math.min(55,Math.round(bf*10)/10));
}
